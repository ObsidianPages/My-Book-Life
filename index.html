<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>My Book Life - Reading Tracker</title>
</head>
<body>
    <header>
        <h1>My Book Life - Reading Tracker</h1>
    </header>
    <main>
        <form id="book-form">
            <input type="text" id="book-title" placeholder="Enter Book Title" required>
            <input type="text" id="book-author" placeholder="Enter Author Name" required>
            <input type="date" id="read-date" required>
            <button type="submit">Add Book</button>
        </form>
        <ul id="book-list"></ul>
    </main>
    <script src="script.js"></script>
</body>
</html>
